<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时系统调用监控面板</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .rate-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .rate-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rate-value {
            font-size: 36px;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            font-variant-numeric: tabular-nums;
        }

        .rate-unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }

        .chart-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .chart-title {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            z-index: 10;
        }

        #sunburst {
            width: 100%;
            height: 100%;
        }

        .side-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .stats-card h3 {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .category-name {
            flex: 1;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .category-count {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
        }

        .category-percent {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            width: 40px;
            text-align: right;
        }

        .connection-status {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            z-index: 10;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-dot.disconnected {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(10px);
        }

        .tooltip .tip-title {
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .tooltip .tip-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 3px 0;
        }

        .tooltip .tip-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .tooltip .tip-value {
            color: #ffffff;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .arc-path {
            cursor: pointer;
            transition: opacity 0.3s, transform 0.3s;
        }

        .arc-path:hover {
            opacity: 0.8;
            filter: brightness(1.2);
        }

        .center-text {
            font-size: 14px;
            fill: rgba(255, 255, 255, 0.7);
            text-anchor: middle;
            pointer-events: none;
        }

        .center-value {
            font-size: 24px;
            font-weight: 700;
            fill: #00d4ff;
            text-anchor: middle;
            pointer-events: none;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 400px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        .anomaly-overlay {
            pointer-events: none;
            fill: none;
            stroke: #ff3333;
            stroke-width: 3;
            opacity: 0;
        }

        .anomaly-overlay.active {
            animation: anomaly-pulse 0.8s infinite;
        }

        @keyframes anomaly-pulse {
            0%, 100% {
                opacity: 0;
                stroke-width: 3;
            }
            50% {
                opacity: 1;
                stroke-width: 5;
            }
        }

        .anomaly-ring {
            pointer-events: none;
            fill: none;
            stroke: #ff4444;
            stroke-width: 4;
            opacity: 0;
        }

        .anomaly-ring.active {
            animation: ring-pulse 0.6s infinite;
        }

        @keyframes ring-pulse {
            0%, 100% {
                opacity: 0.3;
                stroke-width: 2;
            }
            50% {
                opacity: 1;
                stroke-width: 6;
            }
        }

        .alert-panel {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 5px;
        }

        .alert-panel::-webkit-scrollbar {
            width: 4px;
        }

        .alert-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .alert-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .alert-item {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #ff4444;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .alert-item.new {
            animation: alert-flash 1s ease-out;
        }

        @keyframes alert-flash {
            0% {
                background: rgba(255, 68, 68, 0.4);
            }
            100% {
                background: rgba(255, 68, 68, 0.1);
            }
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .alert-syscall {
            font-weight: 600;
            color: #ff6b6b;
        }

        .alert-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
        }

        .alert-msg {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.4;
        }

        .alert-badge {
            display: inline-block;
            background: #ff4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            animation: badge-pulse 1s infinite;
        }

        @keyframes badge-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .timeline-container {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .timeline-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .mode-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 2px;
        }

        .mode-btn {
            padding: 4px 10px;
            font-size: 11px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .mode-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            color: white;
            font-weight: 500;
        }

        .timeline-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            margin: 10px 0;
        }

        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: transform 0.2s;
        }

        .timeline-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .timeline-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }

        .timeline-current {
            text-align: center;
            font-size: 13px;
            color: #00d4ff;
            font-weight: 500;
            margin-top: 6px;
        }

        .timeline-slider:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .replay-indicator {
            position: absolute;
            top: 15px;
            right: 120px;
            background: rgba(255, 170, 0, 0.9);
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            display: none;
            animation: replay-blink 1s infinite;
        }

        .replay-indicator.active {
            display: block;
        }

        @keyframes replay-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .playback-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .play-btn {
            padding: 5px 12px;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .play-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .playback-speed {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-left: auto;
        }

        .speed-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>🔍 实时系统调用监控面板</h1>
                <div class="subtitle">基于 D3.js & WebSocket · 系统调用实时可视化</div>
            </div>
            <div class="rate-panel">
                <div class="rate-label">总调用速率</div>
                <div class="rate-value" id="rateValue">0</div>
                <div class="rate-unit">次 / 秒</div>
            </div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <div class="chart-title">📊 系统调用分布 - 旭日图</div>
                <div class="replay-indicator" id="replayIndicator">⏪ 历史回放模式</div>
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">连接中...</span>
                </div>
                <svg id="sunburst"></svg>
                <div class="tooltip" id="tooltip"></div>

                <div class="timeline-container">
                    <div class="timeline-header">
                        <div class="timeline-title">⏱️ 时间轴回放</div>
                        <div class="mode-toggle">
                            <button class="mode-btn active" id="liveModeBtn" onclick="setMode('live')">实时</button>
                            <button class="mode-btn" id="replayModeBtn" onclick="setMode('replay')">回放</button>
                        </div>
                    </div>
                    <input type="range" class="timeline-slider" id="timelineSlider" min="0" max="300" value="0" disabled>
                    <div class="timeline-labels">
                        <span id="timelineStart">-5:00</span>
                        <span id="timelineEnd">现在</span>
                    </div>
                    <div class="timeline-current" id="timelineCurrent">--:--:--</div>
                    <div class="playback-controls">
                        <button class="play-btn" id="prevBtn" onclick="stepTime(-1)" disabled>⏮</button>
                        <button class="play-btn" id="playBtn" onclick="togglePlayback()" disabled>▶</button>
                        <button class="play-btn" id="nextBtn" onclick="stepTime(1)" disabled>⏭</button>
                        <span class="playback-speed">
                            速度:
                            <select class="speed-select" id="speedSelect" onchange="setPlaybackSpeed(this.value)" disabled>
                                <option value="0.5">0.5x</option>
                                <option value="1" selected>1x</option>
                                <option value="2">2x</option>
                                <option value="4">4x</option>
                            </select>
                        </span>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="stats-card">
                    <h3>
                        📁 分类统计
                    </h3>
                    <div class="category-stats" id="categoryStats"></div>
                </div>

                <div class="stats-card">
                    <h3>
                        🚨 告警日志
                        <span class="alert-badge" id="alertBadge" style="display:none;">0</span>
                    </h3>
                    <div class="alert-panel" id="alertPanel"></div>
                </div>

                <div class="stats-card">
                    <h3>📈 历史汇总 (5分钟)</h3>
                    <div class="category-stats">
                        <div class="category-item">
                            <div class="category-name">总调用次数</div>
                            <div class="category-count" id="totalCalls">0</div>
                        </div>
                        <div class="category-item">
                            <div class="category-name">总耗时 (ms)</div>
                            <div class="category-count" id="totalTime">0</div>
                        </div>
                        <div class="category-item">
                            <div class="category-name">平均速率</div>
                            <div class="category-count" id="avgRate">0</div>
                        </div>
                        <div class="category-item">
                            <div class="category-name">数据窗口</div>
                            <div class="category-count" id="windowCount">0</div>
                        </div>
                    </div>
                    <div class="footer-info">
                        <span id="lastUpdate">--:--:--</span>
                        <span id="retention">保留 5 分钟</span>
                    </div>
                </div>

                <div class="stats-card">
                    <h3>⚡ 热门调用</h3>
                    <div class="category-stats" id="topSyscalls"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categoryColors = {
            "file_ops": "#00d4ff",
            "network": "#7b2ff7",
            "process": "#ff6b6b",
            "memory": "#4ecdc4",
            "time": "#ffd93d"
        };

        const categoryNames = {
            "file_ops": "文件操作",
            "network": "网络通信",
            "process": "进程管理",
            "memory": "内存管理",
            "time": "时间系统"
        };

        const categoryColorScale = d3.scaleOrdinal()
            .domain(Object.keys(categoryColors))
            .range(Object.values(categoryColors));

        const syscallCategories = {
            "file_ops": ["open", "read", "write", "close", "creat", "unlink", "rename", "stat", "fstat", "lseek"],
            "network": ["socket", "connect", "accept", "send", "recv", "bind", "listen"],
            "process": ["fork", "execve", "exit", "wait", "kill", "getpid", "getppid"],
            "memory": ["mmap", "munmap", "brk", "sbrk", "mprotect"],
            "time": ["time", "gettimeofday", "clock_gettime", "nanosleep", "usleep"]
        };

        const syscallToCategory = {};
        for (const [cat, syscalls] of Object.entries(syscallCategories)) {
            for (const s of syscalls) {
                syscallToCategory[s] = cat;
            }
        }

        let ws = null;
        let currentData = null;
        let liveData = null;
        let historyData = { windows: [], total_count: 0, total_time: 0 };
        let fullHistory = [];
        let svg, root, arc, radius, centerValueEl, anomalyLayer;
        let tooltipEl;

        let pendingData = null;
        let renderScheduled = false;
        let isTransitioning = false;
        let lastHistoryUpdate = 0;

        let mode = 'live';
        let replayIndex = -1;
        let isPlaying = false;
        let playbackTimer = null;
        let playbackSpeed = 1;

        let activeAnomalies = new Set();
        let anomalyTimers = {};

        const rateValueEl = document.getElementById('rateValue');
        const categoryStatsEl = document.getElementById('categoryStats');
        const topSyscallsEl = document.getElementById('topSyscalls');
        const totalCallsEl = document.getElementById('totalCalls');
        const totalTimeEl = document.getElementById('totalTime');
        const avgRateEl = document.getElementById('avgRate');
        const windowCountEl = document.getElementById('windowCount');
        const lastUpdateEl = document.getElementById('lastUpdate');
        const statusDotEl = document.getElementById('statusDot');
        const statusTextEl = document.getElementById('statusText');
        const alertPanelEl = document.getElementById('alertPanel');
        const alertBadgeEl = document.getElementById('alertBadge');
        const timelineSliderEl = document.getElementById('timelineSlider');
        const timelineStartEl = document.getElementById('timelineStart');
        const timelineEndEl = document.getElementById('timelineEnd');
        const timelineCurrentEl = document.getElementById('timelineCurrent');
        const liveModeBtn = document.getElementById('liveModeBtn');
        const replayModeBtn = document.getElementById('replayModeBtn');
        const replayIndicator = document.getElementById('replayIndicator');
        const prevBtn = document.getElementById('prevBtn');
        const playBtn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const speedSelectEl = document.getElementById('speedSelect');

        let alertCount = 0;
        let seenAlertIds = new Set();

        function initChart() {
            const container = document.querySelector('.chart-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            radius = Math.min(width, height) / 2 - 50;

            svg = d3.select('#sunburst')
                .attr('width', width)
                .attr('height', height)
                .append('g')
                .attr('transform', `translate(${width / 2}, ${height / 2})`);

            anomalyLayer = svg.append('g').attr('class', 'anomaly-layer');

            arc = d3.arc()
                .startAngle(d => d.x0)
                .endAngle(d => d.x1)
                .padAngle(d => Math.min((d.x1 - d.x0) / 2, 0.005))
                .padRadius(radius / 2)
                .innerRadius(d => d.y0)
                .outerRadius(d => d.y1 - 1);

            svg.append('text')
                .attr('class', 'center-text')
                .attr('y', -10)
                .text('总调用');

            centerValueEl = svg.append('text')
                .attr('class', 'center-value')
                .attr('y', 20)
                .text('0');

            tooltipEl = document.getElementById('tooltip');
        }

        function buildHierarchy(data) {
            const perCategory = data.per_category || {};
            const perSyscall = data.per_syscall || {};

            const children = [];
            for (const [cat, info] of Object.entries(perCategory)) {
                if (info.count <= 0) continue;

                const syscalls = [];
                const catSyscalls = syscallCategories[cat] || [];
                for (const syscall of catSyscalls) {
                    const info2 = perSyscall[syscall];
                    if (info2 && info2.count > 0) {
                        syscalls.push({
                            name: syscall,
                            count: info2.count,
                            total_time: info2.total_time
                        });
                    }
                }
                for (const [syscall, info2] of Object.entries(perSyscall)) {
                    if (syscallToCategory[syscall] !== cat) continue;
                    if (syscalls.some(s => s.name === syscall)) continue;
                    if (info2.count > 0) {
                        syscalls.push({
                            name: syscall,
                            count: info2.count,
                            total_time: info2.total_time
                        });
                    }
                }

                children.push({
                    name: cat,
                    count: info.count,
                    total_time: info.total_time,
                    children: syscalls
                });
            }

            return { name: "root", children };
        }

        function getChildColor(d) {
            if (d.depth === 1) {
                return categoryColorScale(d.data.name);
            } else {
                const parentColor = d3.color(categoryColorScale(d.parent.data.name));
                if (!parentColor) return "#888";
                const len = d.parent.children ? d.parent.children.length : 1;
                const lightness = 0.3 + (d.index / len) * 0.4;
                return parentColor.brighter(lightness);
            }
        }

        function updateAnomalyHighlights(anomalies) {
            if (!root) return;

            if (!anomalies || anomalies.length === 0) {
                activeAnomalies.forEach(syscall => {
                    clearTimeout(anomalyTimers[syscall]);
                    delete anomalyTimers[syscall];
                });
                activeAnomalies.clear();
                anomalyLayer.selectAll('*').remove();
                return;
            }

            const anomalyNames = new Set(anomalies.map(a => a.syscall));
            const allNodes = root.descendants().filter(d => d.depth > 0);

            anomalies.forEach(anomaly => {
                if (!activeAnomalies.has(anomaly.syscall)) {
                    activeAnomalies.add(anomaly.syscall);
                    showNotification(anomaly);
                }
                clearTimeout(anomalyTimers[anomaly.syscall]);
                anomalyTimers[anomaly.syscall] = setTimeout(() => {
                    activeAnomalies.delete(anomaly.syscall);
                    delete anomalyTimers[anomaly.syscall];
                    renderAnomalyHighlight();
                }, 10000);
            });

            renderAnomalyHighlight();
        }

        function renderAnomalyHighlight() {
            if (!root) {
                anomalyLayer.selectAll('*').remove();
                return;
            }

            const allNodes = root.descendants().filter(d => d.depth > 0);
            const activeNodes = allNodes.filter(d => activeAnomalies.has(d.data.name));

            const rings = anomalyLayer.selectAll('path.anomaly-ring')
                .data(activeNodes, d => d.data.name);

            rings.exit().remove();

            const ringsEnter = rings.enter()
                .append('path')
                .attr('class', 'anomaly-ring active')
                .attr('fill', 'none')
                .attr('stroke', '#ff3333')
                .attr('stroke-width', 4)
                .attr('d', arc);

            ringsEnter.merge(rings)
                .attr('d', arc)
                .each(function(d) {
                    const current = d3.select(this);
                    if (!current.classed('active')) {
                        current.classed('active', true);
                    }
                });
        }

        function showNotification(anomaly) {
            console.log(`%c⚠️  ANOMALY: ${anomaly.message}`, 'color: #ff4444; font-weight: bold; font-size: 12px;');
        }

        function renderChart(data) {
            const hierarchy = buildHierarchy(data);

            root = d3.hierarchy(hierarchy)
                .sum(d => d.count || 0)
                .sort((a, b) => b.value - a.value);

            d3.partition()
                .size([2 * Math.PI, radius])(root);

            const allNodes = root.descendants().filter(d => d.depth);

            const paths = svg.selectAll('path.arc-path')
                .data(allNodes, d => d.data.name + "_" + d.depth);

            paths.exit().remove();

            const pathsEnter = paths.enter()
                .append('path')
                .attr('class', 'arc-path')
                .attr('fill', d => getChildColor(d))
                .attr('d', arc)
                .on('mouseover', function(event, d) {
                    showTooltip(event, d);
                })
                .on('mousemove', function(event) {
                    moveTooltip(event);
                })
                .on('mouseout', function() {
                    hideTooltip();
                });

            const merged = pathsEnter.merge(paths);

            if (isTransitioning || mode === 'replay') {
                merged
                    .attr('d', arc)
                    .attr('fill', d => getChildColor(d))
                    .each(function(d) { this._current = d; });
            } else {
                isTransitioning = true;
                merged
                    .transition()
                    .duration(400)
                    .ease(d3.easeLinear)
                    .attrTween('d', function(d) {
                        const old = this._current || { x0: d.x0, x1: d.x0, y0: d.y0, y1: d.y1 };
                        const interpolate = d3.interpolate(old, d);
                        this._current = d;
                        return t => arc(interpolate(t));
                    })
                    .attr('fill', d => getChildColor(d))
                    .on('end', () => { isTransitioning = false; })
                    .on('interrupt', () => { isTransitioning = false; });
            }

            centerValueEl.text(formatNumber(data.total_count));
            renderAnomalyHighlight();
        }

        function showTooltip(event, d) {
            if (!tooltipEl) return;
            const name = d.data.name;
            const displayName = categoryNames[name] || name;
            const count = d.value;
            const totalTime = d.data.total_time || 0;
            const avgTime = count > 0 ? (totalTime / count).toFixed(3) : 0;
            const percent = root ? ((count / root.value) * 100).toFixed(1) : '0.0';
            const isAnomaly = activeAnomalies.has(name);

            let html = `<div class="tip-title">${displayName}${isAnomaly ? ' <span style="color:#ff4444">⚠️</span>' : ''}</div>`;
            html += `<div class="tip-row"><span class="tip-label">调用次数</span><span class="tip-value">${formatNumber(count)}</span></div>`;
            html += `<div class="tip-row"><span class="tip-label">占比</span><span class="tip-value">${percent}%</span></div>`;
            html += `<div class="tip-row"><span class="tip-label">总耗时</span><span class="tip-value">${Number(totalTime).toFixed(2)} ms</span></div>`;
            if (d.depth > 1) {
                html += `<div class="tip-row"><span class="tip-label">平均耗时</span><span class="tip-value">${avgTime} ms</span></div>`;
            }
            if (isAnomaly) {
                html += `<div style="color:#ff4444;margin-top:4px;font-weight:600;">⚠️ 速率异常 (≥3x基准)</div>`;
            }

            tooltipEl.innerHTML = html;
            tooltipEl.style.opacity = '1';
        }

        function moveTooltip(event) {
            if (!tooltipEl) return;
            tooltipEl.style.left = (event.pageX + 15) + 'px';
            tooltipEl.style.top = (event.pageY + 15) + 'px';
        }

        function hideTooltip() {
            if (tooltipEl) tooltipEl.style.opacity = '0';
        }

        function scheduleRender(data) {
            pendingData = data;
            if (!renderScheduled) {
                renderScheduled = true;
                requestAnimationFrame(() => {
                    renderScheduled = false;
                    const d = pendingData;
                    pendingData = null;
                    if (d) {
                        try {
                            renderChart(d);
                            if (d.anomalies) {
                                updateAnomalyHighlights(d.anomalies);
                            }
                        } catch (e) {
                            console.warn('Render error:', e);
                        }
                    }
                });
            }
        }

        let lastRate = 0;
        let rateAnimFrame = null;
        function updateRatePanel(rate) {
            if (rateAnimFrame) return;
            const start = lastRate;
            const end = rate;
            const startTime = performance.now();
            const duration = 400;

            function step(now) {
                const t = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                const cur = Math.round(start + (end - start) * ease);
                rateValueEl.textContent = formatNumber(cur);
                if (t < 1) {
                    rateAnimFrame = requestAnimationFrame(step);
                } else {
                    rateAnimFrame = null;
                    lastRate = end;
                }
            }
            rateAnimFrame = requestAnimationFrame(step);
        }

        function updateCategoryStats(data) {
            const perCategory = data.per_category || {};
            const total = data.total_count || 1;

            const sorted = Object.entries(perCategory)
                .sort((a, b) => b[1].count - a[1].count);

            let html = '';
            for (const [cat, info] of sorted) {
                const percent = ((info.count / total) * 100).toFixed(1);
                html += `<div class="category-item">
                    <div class="category-color" style="background:${categoryColors[cat]}"></div>
                    <div class="category-name">${categoryNames[cat] || cat}</div>
                    <div class="category-count">${formatNumber(info.count)}</div>
                    <div class="category-percent">${percent}%</div>
                </div>`;
            }
            categoryStatsEl.innerHTML = html;
        }

        function updateTopSyscalls(data) {
            const perSyscall = data.per_syscall || {};
            const colors = ['#00d4ff', '#7b2ff7', '#ff6b6b', '#4ecdc4', '#ffd93d'];

            const sorted = Object.entries(perSyscall)
                .sort((a, b) => b[1].count - a[1].count)
                .slice(0, 5);

            let html = '';
            for (let i = 0; i < sorted.length; i++) {
                const [name, info] = sorted[i];
                const isAnomaly = activeAnomalies.has(name);
                html += `<div class="category-item" style="${isAnomaly ? 'background:rgba(255,68,68,0.1);border-radius:4px;' : ''}">
                    <div class="category-color" style="background:${colors[i]}"></div>
                    <div class="category-name">${name}${isAnomaly ? ' <span style="color:#ff4444">⚠</span>' : ''}</div>
                    <div class="category-count">${formatNumber(info.count)}</div>
                </div>`;
            }
            topSyscallsEl.innerHTML = html;
        }

        function updateAlerts(alerts) {
            if (!alerts || alerts.length === 0) return;

            let newAlerts = [];
            for (const alert of alerts) {
                if (!seenAlertIds.has(alert.id)) {
                    seenAlertIds.add(alert.id);
                    newAlerts.push(alert);
                    alertCount++;
                }
            }

            if (newAlerts.length > 0) {
                alertBadgeEl.style.display = 'inline-block';
                alertBadgeEl.textContent = alertCount;
                renderAlerts(newAlerts);
            }
        }

        function renderAlerts(alerts) {
            if (!alerts || alerts.length === 0) return;

            let html = '';
            for (const alert of alerts) {
                const timeStr = new Date(alert.timestamp * 1000).toLocaleTimeString('zh-CN');
                html += `
                    <div class="alert-item new">
                        <div class="alert-header">
                            <span class="alert-syscall">${alert.syscall}</span>
                            <span class="alert-time">${timeStr}</span>
                        </div>
                        <div class="alert-msg">${alert.message}</div>
                    </div>
                `;
            }
            alertPanelEl.innerHTML = html + alertPanelEl.innerHTML;
        }

        function updateHistorySummary() {
            totalCallsEl.textContent = formatNumber(historyData.total_count);
            totalTimeEl.textContent = formatNumber(Math.round(historyData.total_time || 0));

            const avgRate = historyData.windows.length > 0
                ? Math.round(historyData.total_count / historyData.windows.length)
                : 0;
            avgRateEl.textContent = formatNumber(avgRate) + '/s';
            windowCountEl.textContent = historyData.windows.length + 's';
        }

        const numberFormatter = new Intl.NumberFormat('zh-CN');
        function formatNumber(num) {
            return numberFormatter.format(Math.round(Number(num) || 0));
        }

        function updateStatus(connected) {
            if (connected) {
                statusDotEl.className = 'status-dot connected';
                statusTextEl.textContent = '已连接';
                statusTextEl.style.color = '#00ff88';
            } else {
                statusDotEl.className = 'status-dot disconnected';
                statusTextEl.textContent = '断开连接';
                statusTextEl.style.color = '#ff4444';
            }
        }

        let lastTimeUpdate = 0;
        function updateLastUpdate() {
            const now = Date.now();
            if (now - lastTimeUpdate < 900) return;
            lastTimeUpdate = now;
            lastUpdateEl.textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN');
        }

        function setMode(newMode) {
            if (mode === newMode) return;

            mode = newMode;

            if (mode === 'live') {
                liveModeBtn.classList.add('active');
                replayModeBtn.classList.remove('active');
                replayIndicator.classList.remove('active');
                timelineSliderEl.disabled = true;
                prevBtn.disabled = true;
                playBtn.disabled = true;
                nextBtn.disabled = true;
                speedSelectEl.disabled = true;

                stopPlayback();

                if (liveData) {
                    currentData = liveData;
                    scheduleRender(currentData);
                    updateRatePanel(currentData.rate || currentData.total_count || 0);
                    updateCategoryStats(currentData);
                    updateTopSyscalls(currentData);
                    updateTimeline();
                }
            } else {
                liveModeBtn.classList.remove('active');
                replayModeBtn.classList.add('active');
                replayIndicator.classList.add('active');
                timelineSliderEl.disabled = false;
                prevBtn.disabled = false;
                playBtn.disabled = false;
                nextBtn.disabled = false;
                speedSelectEl.disabled = false;

                if (fullHistory.length === 0) {
                    ws && ws.send(JSON.stringify({ type: 'get_full_history' }));
                }

                if (replayIndex < 0 && fullHistory.length > 0) {
                    replayIndex = fullHistory.length - 1;
                    loadReplayIndex();
                }
            }
        }

        function updateTimeline() {
            if (fullHistory.length === 0) return;

            const maxIdx = fullHistory.length - 1;
            timelineSliderEl.max = maxIdx;

            const startTime = fullHistory[0].timestamp;
            const endTime = fullHistory[maxIdx].timestamp;

            const startOffset = Math.floor((endTime - startTime) / 60);
            timelineStartEl.textContent = startOffset > 0 ? `-${startOffset}:00` : '开始';
            timelineEndEl.textContent = '现在';

            if (mode === 'live') {
                timelineSliderEl.value = maxIdx;
                updateTimelineCurrent(endTime);
            }
        }

        function updateTimelineCurrent(timestamp) {
            const dt = new Date(timestamp * 1000);
            timelineCurrentEl.textContent = dt.toLocaleTimeString('zh-CN');
        }

        function loadReplayIndex() {
            if (replayIndex < 0 || replayIndex >= fullHistory.length) return;

            const data = fullHistory[replayIndex];
            currentData = data;
            timelineSliderEl.value = replayIndex;

            scheduleRender(data);
            updateRatePanel(data.rate || data.total_count || 0);
            updateCategoryStats(data);
            updateTopSyscalls(data);
            updateTimelineCurrent(data.timestamp);
            updateAnomalyHighlights(data.anomalies || []);
        }

        function stepTime(delta) {
            if (mode !== 'replay' || fullHistory.length === 0) return;
            const newIdx = Math.max(0, Math.min(fullHistory.length - 1, replayIndex + delta));
            if (newIdx !== replayIndex) {
                replayIndex = newIdx;
                loadReplayIndex();
            }
        }

        function togglePlayback() {
            if (mode !== 'replay') return;

            if (isPlaying) {
                stopPlayback();
                playBtn.textContent = '▶';
            } else {
                startPlayback();
                playBtn.textContent = '⏸';
            }
        }

        function startPlayback() {
            if (isPlaying) return;
            isPlaying = true;

            const tick = () => {
                if (!isPlaying || mode !== 'replay') return;

                if (replayIndex >= fullHistory.length - 1) {
                    stopPlayback();
                    playBtn.textContent = '▶';
                    return;
                }

                replayIndex++;
                loadReplayIndex();

                const interval = 1000 / playbackSpeed;
                playbackTimer = setTimeout(tick, interval);
            };

            tick();
        }

        function stopPlayback() {
            isPlaying = false;
            if (playbackTimer) {
                clearTimeout(playbackTimer);
                playbackTimer = null;
            }
        }

        function setPlaybackSpeed(speed) {
            playbackSpeed = parseFloat(speed);
        }

        timelineSliderEl && timelineSliderEl.addEventListener('input', function() {
            if (mode !== 'replay') return;
            stopPlayback();
            playBtn.textContent = '▶';
            replayIndex = parseInt(this.value);
            loadReplayIndex();
        });

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8765`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatus(true);
            };

            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);

                    if (message.type === 'history') {
                        historyData = message.data;
                        if (historyData.windows && historyData.windows.length) {
                            const fullWindows = historyData.windows.map(w => ({
                                timestamp: w.t,
                                total_count: w.c,
                                per_category: w.pc || {}
                            }));
                            historyData.windows = fullWindows;
                        }
                        updateHistorySummary();
                    } else if (message.type === 'alerts') {
                        updateAlerts(message.data);
                    } else if (message.type === 'full_history') {
                        fullHistory = message.data.windows || [];
                        updateTimeline();
                        if (mode === 'replay' && replayIndex < 0 && fullHistory.length > 0) {
                            replayIndex = fullHistory.length - 1;
                            loadReplayIndex();
                        }
                    } else if (message.type === 'historical_data') {
                    } else if (message.type === 'update') {
                        liveData = message.data;

                        if (mode === 'live') {
                            currentData = liveData;
                            updateRatePanel(currentData.rate || currentData.total_count || 0);
                            scheduleRender(currentData);
                            updateCategoryStats(currentData);
                            updateTopSyscalls(currentData);
                            updateLastUpdate();
                            updateAnomalyHighlights(currentData.anomalies || []);
                            if (currentData.anomalies && currentData.anomalies.length > 0) {
                                setTimeout(() => updateAlerts(currentData.anomalies), 100);
                            }

                            fullHistory.push(currentData);
                            if (fullHistory.length > 300) {
                                fullHistory.shift();
                            }
                            updateTimeline();
                        } else {
                            fullHistory.push(currentData);
                            if (fullHistory.length > 300) {
                                fullHistory.shift();
                            }
                            updateTimeline();
                        }

                        historyData.windows.push(liveData);
                        if (historyData.windows.length > 300) {
                            const removed = historyData.windows.shift();
                            historyData.total_count = (historyData.total_count || 0) - (removed.total_count || 0);
                            historyData.total_time = (historyData.total_time || 0) - (removed.total_time || 0);
                        } else {
                            historyData.total_count = (historyData.total_count || 0) + (liveData.total_count || 0);
                            historyData.total_time = (historyData.total_time || 0) + (liveData.total_time || 0);
                        }

                        const nowT = Date.now();
                        if (nowT - lastHistoryUpdate > 5000) {
                            lastHistoryUpdate = nowT;
                            updateHistorySummary();
                        }
                    }
                } catch (e) {
                    console.error('WS message error:', e);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected, retrying...');
                updateStatus(false);
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus(false);
            };
        }

        function resizeHandler() {
            d3.select('#sunburst').selectAll('*').remove();
            initChart();
            if (currentData) {
                renderChart(currentData);
                renderAnomalyHighlight();
            }
        }

        window.addEventListener('resize', debounce(resizeHandler, 300));

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            connectWebSocket();
        });
    </script>
</body>
</html>
