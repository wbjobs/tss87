<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时系统调用监控面板</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .rate-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .rate-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rate-value {
            font-size: 36px;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            font-variant-numeric: tabular-nums;
        }

        .rate-unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }

        .chart-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .chart-title {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            z-index: 10;
        }

        #sunburst {
            width: 100%;
            height: 100%;
        }

        .side-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .stats-card h3 {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .category-name {
            flex: 1;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .category-count {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
        }

        .category-percent {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            width: 40px;
            text-align: right;
        }

        .connection-status {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            z-index: 10;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-dot.disconnected {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(10px);
        }

        .tooltip .tip-title {
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .tooltip .tip-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 3px 0;
        }

        .tooltip .tip-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .tooltip .tip-value {
            color: #ffffff;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .arc-path {
            cursor: pointer;
            transition: opacity 0.3s, transform 0.3s;
        }

        .arc-path:hover {
            opacity: 0.8;
            filter: brightness(1.2);
        }

        .center-text {
            font-size: 14px;
            fill: rgba(255, 255, 255, 0.7);
            text-anchor: middle;
            pointer-events: none;
        }

        .center-value {
            font-size: 24px;
            font-weight: 700;
            fill: #00d4ff;
            text-anchor: middle;
            pointer-events: none;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 400px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>🔍 实时系统调用监控面板</h1>
                <div class="subtitle">基于 D3.js & WebSocket · 系统调用实时可视化</div>
            </div>
            <div class="rate-panel">
                <div class="rate-label">总调用速率</div>
                <div class="rate-value" id="rateValue">0</div>
                <div class="rate-unit">次 / 秒</div>
            </div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <div class="chart-title">📊 系统调用分布 - 旭日图</div>
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">连接中...</span>
                </div>
                <svg id="sunburst"></svg>
                <div class="tooltip" id="tooltip"></div>
            </div>

            <div class="side-panel">
                <div class="stats-card">
                    <h3>📁 分类统计</h3>
                    <div class="category-stats" id="categoryStats"></div>
                </div>

                <div class="stats-card">
                    <h3>📈 历史汇总 (5分钟)</h3>
                    <div class="category-stats">
                        <div class="category-item">
                            <div class="category-name">总调用次数</div>
                            <div class="category-count" id="totalCalls">0</div>
                        </div>
                        <div class="category-item">
                            <div class="category-name">总耗时 (ms)</div>
                            <div class="category-count" id="totalTime">0</div>
                        </div>
                        <div class="category-item">
                            <div class="category-name">平均速率</div>
                            <div class="category-count" id="avgRate">0</div>
                        </div>
                        <div class="category-item">
                            <div class="category-name">数据窗口</div>
                            <div class="category-count" id="windowCount">0</div>
                        </div>
                    </div>
                    <div class="footer-info">
                        <span id="lastUpdate">--:--:--</span>
                        <span id="retention">保留 5 分钟</span>
                    </div>
                </div>

                <div class="stats-card">
                    <h3>⚡ 热门调用</h3>
                    <div class="category-stats" id="topSyscalls"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categoryColors = {
            "file_ops": "#00d4ff",
            "network": "#7b2ff7",
            "process": "#ff6b6b",
            "memory": "#4ecdc4",
            "time": "#ffd93d"
        };

        const categoryNames = {
            "file_ops": "文件操作",
            "network": "网络通信",
            "process": "进程管理",
            "memory": "内存管理",
            "time": "时间系统"
        };

        const categoryColorScale = d3.scaleOrdinal()
            .domain(Object.keys(categoryColors))
            .range(Object.values(categoryColors));

        let ws = null;
        let currentData = null;
        let historyData = { windows: [], total_count: 0, total_time: 0 };
        let svg, root, arc, radius;

        function initChart() {
            const container = document.querySelector('.chart-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            radius = Math.min(width, height) / 2 - 50;

            svg = d3.select('#sunburst')
                .attr('width', width)
                .attr('height', height)
                .append('g')
                .attr('transform', `translate(${width / 2}, ${height / 2})`);

            arc = d3.arc()
                .startAngle(d => d.x0)
                .endAngle(d => d.x1)
                .padAngle(d => Math.min((d.x1 - d.x0) / 2, 0.005))
                .padRadius(radius / 2)
                .innerRadius(d => d.y0)
                .outerRadius(d => d.y1 - 1);

            svg.append('text')
                .attr('class', 'center-text')
                .attr('y', -10)
                .text('总调用');

            svg.append('text')
                .attr('class', 'center-value')
                .attr('id', 'centerValue')
                .attr('y', 20)
                .text('0');
        }

        function buildHierarchy(data) {
            const perCategory = data.per_category || {};
            const perSyscall = data.per_syscall || {};

            const categoryMap = {};
            for (const [cat, info] of Object.entries(perCategory)) {
                categoryMap[cat] = {
                    name: cat,
                    count: info.count,
                    total_time: info.total_time,
                    children: []
                };
            }

            const syscallToCategory = {};
            const syscallCategories = {
                "file_ops": ["open", "read", "write", "close", "creat", "unlink", "rename", "stat", "fstat", "lseek"],
                "network": ["socket", "connect", "accept", "send", "recv", "bind", "listen"],
                "process": ["fork", "execve", "exit", "wait", "kill", "getpid", "getppid"],
                "memory": ["mmap", "munmap", "brk", "sbrk", "mprotect"],
                "time": ["time", "gettimeofday", "clock_gettime", "nanosleep", "usleep"]
            };

            for (const [cat, syscalls] of Object.entries(syscallCategories)) {
                for (const s of syscalls) {
                    syscallToCategory[s] = cat;
                }
            }

            for (const [syscall, info] of Object.entries(perSyscall)) {
                const cat = syscallToCategory[syscall] || "file_ops";
                if (categoryMap[cat]) {
                    categoryMap[cat].children.push({
                        name: syscall,
                        count: info.count,
                        total_time: info.total_time
                    });
                }
            }

            const root = {
                name: "root",
                children: Object.values(categoryMap).filter(c => c.count > 0)
            };

            return root;
        }

        function getChildColor(d) {
            if (d.depth === 1) {
                return categoryColorScale(d.data.name);
            } else {
                const parentColor = d3.color(categoryColorScale(d.parent.data.name));
                const lightness = 0.5 + (d.index / (d.parent.children ? d.parent.children.length : 1)) * 0.3;
                return parentColor.brighter(lightness);
            }
        }

        function updateChart(data) {
            const hierarchy = buildHierarchy(data);
            
            root = d3.hierarchy(hierarchy)
                .sum(d => d.count || 0)
                .sort((a, b) => b.value - a.value);

            d3.partition()
                .size([2 * Math.PI, radius])(root);

            const paths = svg.selectAll('path')
                .data(root.descendants().filter(d => d.depth));

            paths.exit()
                .transition()
                .duration(750)
                .attrTween('d', d => {
                    const interpolate = d3.interpolate(d.x0, d.x0);
                    return t => {
                        d.x0 = d.x1 = interpolate(t);
                        return arc(d);
                    };
                })
                .remove();

            const pathsEnter = paths.enter()
                .append('path')
                .attr('class', 'arc-path')
                .attr('fill', d => getChildColor(d))
                .attr('d', arc)
                .on('mouseover', function(event, d) {
                    showTooltip(event, d);
                })
                .on('mousemove', function(event) {
                    moveTooltip(event);
                })
                .on('mouseout', function() {
                    hideTooltip();
                });

            paths.merge(pathsEnter)
                .transition()
                .duration(750)
                .attrTween('d', function(d) {
                    const old = this._current || { x0: 0, x1: 0, y0: d.y0, y1: d.y1 };
                    const interpolate = d3.interpolate(old, d);
                    this._current = d;
                    return t => arc(interpolate(t));
                })
                .attr('fill', d => getChildColor(d));

            document.getElementById('centerValue').textContent = formatNumber(data.total_count);
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            const name = d.data.name;
            const displayName = categoryNames[name] || name;
            const count = d.value;
            const totalTime = d.data.total_time || 0;
            const avgTime = count > 0 ? (totalTime / count).toFixed(3) : 0;
            const percent = ((count / root.value) * 100).toFixed(1);

            let html = `<div class="tip-title">${displayName}</div>`;
            html += `<div class="tip-row"><span class="tip-label">调用次数</span><span class="tip-value">${formatNumber(count)}</span></div>`;
            html += `<div class="tip-row"><span class="tip-label">占比</span><span class="tip-value">${percent}%</span></div>`;
            html += `<div class="tip-row"><span class="tip-label">总耗时</span><span class="tip-value">${totalTime.toFixed(2)} ms</span></div>`;
            if (d.depth > 1) {
                html += `<div class="tip-row"><span class="tip-label">平均耗时</span><span class="tip-value">${avgTime} ms</span></div>`;
            }

            tooltip.innerHTML = html;
            tooltip.style.opacity = '1';
        }

        function moveTooltip(event) {
            const tooltip = document.getElementById('tooltip');
            const x = event.pageX + 15;
            const y = event.pageY + 15;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = '0';
        }

        function updateRatePanel(rate) {
            const el = document.getElementById('rateValue');
            const current = parseInt(el.textContent.replace(/,/g, '')) || 0;
            animateValue(el, current, rate, 500);
        }

        function updateCategoryStats(data) {
            const container = document.getElementById('categoryStats');
            const perCategory = data.per_category || {};
            const total = data.total_count || 1;

            const sorted = Object.entries(perCategory)
                .sort((a, b) => b[1].count - a[1].count);

            container.innerHTML = sorted.map(([cat, info]) => {
                const percent = ((info.count / total) * 100).toFixed(1);
                return `
                    <div class="category-item">
                        <div class="category-color" style="background: ${categoryColors[cat]}"></div>
                        <div class="category-name">${categoryNames[cat] || cat}</div>
                        <div class="category-count">${formatNumber(info.count)}</div>
                        <div class="category-percent">${percent}%</div>
                    </div>
                `;
            }).join('');
        }

        function updateTopSyscalls(data) {
            const container = document.getElementById('topSyscalls');
            const perSyscall = data.per_syscall || {};

            const sorted = Object.entries(perSyscall)
                .sort((a, b) => b[1].count - a[1].count)
                .slice(0, 5);

            container.innerHTML = sorted.map(([name, info], i) => {
                const colors = ['#00d4ff', '#7b2ff7', '#ff6b6b', '#4ecdc4', '#ffd93d'];
                return `
                    <div class="category-item">
                        <div class="category-color" style="background: ${colors[i]}"></div>
                        <div class="category-name">${name}</div>
                        <div class="category-count">${formatNumber(info.count)}</div>
                    </div>
                `;
            }).join('');
        }

        function updateHistorySummary() {
            document.getElementById('totalCalls').textContent = formatNumber(historyData.total_count);
            document.getElementById('totalTime').textContent = formatNumber(Math.round(historyData.total_time));
            
            const avgRate = historyData.windows.length > 0 
                ? Math.round(historyData.total_count / historyData.windows.length)
                : 0;
            document.getElementById('avgRate').textContent = formatNumber(avgRate) + '/s';
            document.getElementById('windowCount').textContent = historyData.windows.length + 's';
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('zh-CN').format(Math.round(num));
        }

        function animateValue(element, start, end, duration) {
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(start + (end - start) * ease);
                element.textContent = formatNumber(current);
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
                text.style.color = '#00ff88';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '断开连接';
                text.style.color = '#ff4444';
            }
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                '最后更新: ' + now.toLocaleTimeString('zh-CN');
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8765`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatus(true);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                
                if (message.type === 'history') {
                    historyData = message.data;
                    updateHistorySummary();
                } else if (message.type === 'update') {
                    currentData = message.data;
                    
                    updateRatePanel(currentData.rate);
                    updateChart(currentData);
                    updateCategoryStats(currentData);
                    updateTopSyscalls(currentData);
                    updateLastUpdate();
                    
                    historyData.windows.push(currentData);
                    if (historyData.windows.length > 300) {
                        const removed = historyData.windows.shift();
                        historyData.total_count -= removed.total_count;
                        historyData.total_time -= removed.total_time;
                    } else {
                        historyData.total_count += currentData.total_count;
                        historyData.total_time += currentData.total_time;
                    }
                    updateHistorySummary();
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected, retrying...');
                updateStatus(false);
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus(false);
            };
        }

        function resizeHandler() {
            d3.select('#sunburst').selectAll('*').remove();
            initChart();
            if (currentData) {
                updateChart(currentData);
            }
        }

        window.addEventListener('resize', debounce(resizeHandler, 250));

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            connectWebSocket();
        });
    </script>
</body>
</html>
